  <style>
    body {
      background-color: #f5f5f5; /* Light gray background */

    .container {
      /* padding-top: 50px; */

      text-align: center;

   /* Navbar */
.navbar {
  background-color: #003366; /* Dark gray */
  border-bottom: 2px solid #555; /* Slightly lighter gray border */
}

.navbar-brand {
  color: #fff !important; /* White logo text */
}

.navbar-nav .nav-link {
  color: #dcdcdc !important; /* Light gray links */
}

.navbar-nav .nav-link:hover {
  color: #fff !important; /* White on hover */
}
    .thank-you-icon {
      margin-top: 20px;
      font-size: 100px;
      color: #28a745; /* Green color */
    }

    .thank-you-heading {
      margin-top: 20px;
      color: #003366; /* Dark gray color */
      font-size: 32px;
      font-weight: bold;
    }

    .thank-you-message {
      margin-top: 20px;
      color: #666; /* Medium gray color */
      font-size: 18px;
    }

    .continue-shopping-btn {
      margin-top: 30px;
      padding: 10px 30px;
      background-color: #003366; /* Blue color */
      color: #fff; /* White color */
      border: none;
      border-radius: 5px;
      font-size: 18px;
      transition: background-color 0.3s ease;
    }

    .continue-shopping-btn:hover {
      background-color: #0056b3; /* Darker blue on hover */
    }
    .product-card {
    background-color: #f8f9fa; /* Light background color */
    border-radius: 20px;
    min-height: 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    padding: 15px;
    /* bottom: 20px; */
    transition: all 0.3s ease;
    margin-top: 20px;
  }
