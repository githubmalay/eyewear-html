<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1" role="dialog" aria-labelledby="productModalLabel" aria-hidden="true">

    <div class="modal-content">

      </div>

        <!-- Product details will be displayed here -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary">Add to Cart</button>

    </div>

</div>
<!-- Product Details Modal -->
<div class="modal fade" id="productDetailModal" tabindex="-1" role="dialog" aria-labelledby="productDetailModalLabel" aria-hidden="true">

      <div class="modal-body">

          <div class="col-md-5">
            <img id="modalProductImage" src="" alt="Product Image" class="img-fluid" style="max-height: 250px; width: auto;">
          </div>
          <div class="col-md-7">
            <h2 id="modalProductName"></h2>
            <p id="modalProductDescription"></p>
            <h4 id="modalProductPrice" class="text-primary"></h4>
          </div>
        </div>
      </div>
      <div class="modal-footer">

        <!-- <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button> -->
      </div>
    </div>

<script src="script.js"></script>
<script>
  // Example data for demonstration
const productData = [
  {
    id: 1,
    name: "Vincent Chase",
    price: "₹1499",
    image: "p1.webp",
    description: "Stylish eyewear with superior lens quality."
  },
  {
    id: 2,
    name: "Eyewear Air",
    price: "₹1499",
    image: "p2.webp",
    description: "Lightweight and durable, perfect for daily use."
  },
  {
    id: 3,
    name: "Vincent Chase Premium",
    price: "₹1999",
    image: "p3.webp",
    description: "Premium eyewear with a sleek and elegant design."
  }
];

// Function to show product details in the modal
function showProductDetails(productId) {
  const product = productData.find(p => p.id === productId);
  if (product) {
    document.getElementById('modalProductImage').src = product.image;
    document.getElementById('modalProductName').textContent = product.name;
    document.getElementById('modalProductPrice').textContent = product.price;
    document.getElementById('modalProductDescription').textContent = product.description;
    $('#productDetailModal').modal('show');
  }
}

// Attach event listeners to product cards (modify for your specific layout)
document.querySelectorAll('.product-card button').forEach((button, index) => {
  button.addEventListener('click', () => showProductDetails(index + 1));
});

</script>
