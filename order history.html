<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">EYEWEAR</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Cart</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluied m-4 mt-5">
        <h2 class="text-center mb-4">Order History</h2>
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
            <div class="col">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Order ID: 80</h5>
                        <p class="card-text"><strong>Shipping Name:</strong> meet</p>
                        <p class="card-text"><strong>Total Price:</strong> ₹1200.00</p>
                        <p class="card-text"><strong>Shipping Address:</strong> Gandhi Nagar</p>
                        <div class="progress mb-3">
                            <div class="progress-bar bg-gold" role="progressbar" style="width: 100%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-success"><i class="bi bi-check-circle-fill"></i></span>
                            <span class="badge bg-warning"><i class="bi bi-truck"></i></span>
                            <span class="badge bg-info"><i class="bi bi-box"></i></span>
                            <span class="badge bg-primary"><i class="bi bi-gift"></i></span>
                        </div>
                        <p class="mt-3"><strong>Rating:</strong>
                            <span class="text-warning">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
                        </p>
                    </div>
                </div>
            </div>
            <!-- Repeat similar card structure for other orders -->
            <!-- Card 2 -->
            <div class="col">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Order ID: 79</h5>
                        <p class="card-text"><strong>Shipping Name:</strong> meet</p>
                        <p class="card-text"><strong>Total Price:</strong> ₹2700.00</p>
                        <p class="card-text"><strong>Shipping Address:</strong> Sector 12b</p>
                        <div class="progress mb-3">
                            <div class="progress-bar bg-gold" role="progressbar" style="width: 100%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-success"><i class="bi bi-check-circle-fill"></i></span>
                            <span class="badge bg-warning"><i class="bi bi-truck"></i></span>
                            <span class="badge bg-info"><i class="bi bi-box"></i></span>
                            <span class="badge bg-primary"><i class="bi bi-gift"></i></span>
                        </div>
                        <a href="feedback.html" class="btn btn-primary mt-3">Leave Feedback</a>
                    </div>
                </div>
            </div>
            <!-- More cards for other orders can be added similarly -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
