<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You for Shopping</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body {
      background-color: #f5f5f5; /* Light gray background */
      font-family: 'Roboto', sans-serif;
    }

    .card {
        margin-top: 20px;
      background-color: white;
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .navbar {
  background-color: #003366; /* Dark gray */
  border-bottom: 2px solid #555; /* Slightly lighter gray border */
}

.navbar-brand {
  color: #fff !important; /* White logo text */
}

.navbar-nav .nav-link {
  color: #dcdcdc !important; /* Light gray links */
}

.navbar-nav .nav-link:hover {
  color: #fff !important; /* White on hover */
}

    .star-rating {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .star-rating input {
      display: none;
    }

    .star-rating label {
      font-size: 30px;
      color: lightgray;
      cursor: pointer;
      transition: color 0.3s;
    }

    .star-rating input:checked ~ label {
      color: gold;
    }

    .star-rating label:hover,
    .star-rating label:hover ~ label {
      color: gold;
    }

    /* Label Styling */
    label {
      font-weight: bold;
      color:#003366; /* Dark clay color for labels */
      text-align: left; /* Left-align labels */
      display: block; /* Make labels block-level */
      margin-bottom: 5px; /* Space below the label */
    }

    /* Form Group Styling */
    .form-group {
      text-align: left; /* Left-align text within form groups */
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">EYEWEAR</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
  
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item active">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="cart.html">Cart</a>
          </li>
        </ul>
      </div>
    </div>
    </div>
  </nav>

  <div class="container mb-4">
    <div class="card">
    <h2 class="mb-4"> Your Feedback!</h2>
    <form>
      <div class="form-group">
        <label for="customerName">Customer Name:</label>
        <input type="text" class="form-control" id="customerName" placeholder="Enter your name" required>
      </div>
      <div class="form-group">
        <label for="description">Feedback Description:</label>
        <textarea class="form-control" id="description" rows="3" placeholder="Enter your feedback" required></textarea>
      </div>
      <div class="form-group">
        <label>Rating:</label>
        <div class="star-rating">
          <input type="radio" id="star5" name="rating" value="5"><label for="star5" class="fas fa-star"></label>
          <input type="radio" id="star4" name="rating" value="4"><label for="star4" class="fas fa-star"></label>
          <input type="radio" id="star3" name="rating" value="3"><label for="star3" class="fas fa-star"></label>
          <input type="radio" id="star2" name="rating" value="2"><label for="star2" class="fas fa-star"></label>
          <input type="radio" id="star1" name="rating" value="1"><label for="star1" class="fas fa-star"></label>
        </div>
      </div>
      <a href="index.html" class="btn btn-primary continue-shopping-btn">Continue Shopping</a>
    </form>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
