<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add to Cart</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">EYEWEAR</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item active">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="cart.html">Cart</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="login.html">Login</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>


  <div class="container mb-3">
    <h1 class="mt-4">Your Cart</h1>
    <div class="row">
      <div class="col-md-8">
        <!-- Cart Item 1 -->
        <div class="cart-item border-bottom pb-3 mb-3">
          <div class="row align-items-center">
            <div class="col-4 col-md-3">
              <img src="p1.webp" class="img-fluid" alt="Product">
            </div>
            <div class="col-8 col-md-9">
              <h4 class="mt-0">Vincent Chase</h4>
              <p>Silver Full Rim Aviator</p>
              <p class="mb-2"><strong>Price:</strong> ₹1499</p>
              <div class="d-flex align-items-center">
                <label for="quantity1" class="mr-2">Quantity:</label>
                <input type="number" id="quantity1" class="form-control d-inline mr-3" style="width: 80px;" value="1" min="1" onchange="updateTotal()">
                <button class="btn btn-danger btn-sm">Remove</button>
              </div>
            </div>
          </div>
        </div>
  
        <!-- Cart Item 2 -->
        <div class="cart-item border-bottom pb-3 mb-3">
          <div class="row align-items-center">
            <div class="col-4 col-md-3">
              <img src="p2.webp" class="img-fluid" alt="Product">
            </div>
            <div class="col-8 col-md-9">
              <h4 class="mt-0">Eyewear Air</h4>
              <p>Black Full Rim Aviator</p>
              <p class="mb-2"><strong>Price:</strong> ₹1499</p>
              <div class="d-flex align-items-center">
                <label for="quantity2" class="mr-2">Quantity:</label>
                <input type="number" id="quantity2" class="form-control d-inline mr-3" style="width: 80px;" value="1" min="1" onchange="updateTotal()">
                <button class="btn btn-danger btn-sm">Remove</button>
              </div>
            </div>
          </div>
        </div>
      </div>
  
      <!-- Cart Summary -->
      <div class="col-md-4">
        <div class="total-price">
          <div class="card-body">
            <h3 class="mb-3">Cart Summary</h3>
            <h6 class="card-title">Add Your Prescription</h6>
            <input type="file" name="image" accept="image/*" required>
          </div>
  
          <!-- Subtotal, Shipping, and Total -->
          <ul class="list-group list-group-flush mt-3">
            <li class="list-group-item d-flex justify-content-between">
              <span>Subtotal</span>
              <span id="subtotal">₹2998</span>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span>Shipping</span>
              <span>Free</span>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span>Total</span>
              <span id="totalPrice">₹2998</span>
            </li>
          </ul>
          <a href="ship.html">
            <button class="btn btn-primary mt-3">Proceed to Checkout</button>
          </a>
        </div>
      </div>
    </div>
  </div>
  

  <script>
    function updateTotal() {
      let quantity1 = document.getElementById('quantity1').value;
      let quantity2 = document.getElementById('quantity2').value;
      let price1 = 1499;
      let price2 = 1499;
      
      let total1 = price1 * quantity1;
      let total2 = price2 * quantity2;
      
      document.getElementById('item1Price').innerText = '₹' + total1;
      document.getElementById('item2Price').innerText = '₹' + total2;
      
      let subtotal = total1 + total2;
      document.getElementById('subtotal').innerText = '₹' + subtotal;
      document.getElementById('totalPrice').innerText = '₹' + subtotal;
    }
  </script>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>

</html>
